<div class="content-section">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon stat-icon-blue"><i class="bi bi-people"></i></div>
      <div>
        <div class="stat-value">{{ gestionnaire.length }}</div>
        <div class="stat-label">Gestionnaires</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-teal"><i class="bi bi-clipboard-check"></i></div>
      <div>
        <div class="stat-value">{{ questionnaires.length }}</div>
        <div class="stat-label">Questionnaires</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-purple"><i class="bi bi-chat-dots"></i></div>
      <div>
        <div class="stat-value">{{ totalReponsesCount }}</div>
        <div class="stat-label">Réponses</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-green"><i class="bi bi-gift"></i></div>
      <div>
        <div class="stat-value">{{ offres.length }}</div>
        <div class="stat-label">Offres</div>
      </div>
    </div>
  </div>

  <div class="tab-panel">
    <div class="offres-catalog-grid">
      <div class="offre-catalog-card" *ngFor="let o of offres">
        <div class="offre-catalog-body">
          <div class="offre-catalog-title"><i class="bi bi-gift"></i> {{ o.title }}</div>
          <div class="offre-catalog-desc">{{ o.description }}</div>
        </div>
        <div class="offre-catalog-actions">
          <button class="btn-icon btn-edit" title="Modifier" (click)="editOffre.emit(o)"><i class="bi bi-pencil"></i></button>
          <button class="btn-icon btn-delete" title="Supprimer" (click)="deleteOffre.emit(o.id)"><i class="bi bi-trash"></i></button>
        </div>
      </div>
      <div class="empty-state" *ngIf="offres.length === 0">
        <i class="bi bi-gift"></i><p>Aucune offre disponible</p>
      </div>
    </div>
  </div>
</div>
