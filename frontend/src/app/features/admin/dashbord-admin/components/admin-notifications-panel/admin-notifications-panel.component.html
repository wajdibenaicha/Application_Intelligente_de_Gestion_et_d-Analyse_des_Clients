<div class="notif-overlay" (click)="closed.emit()"></div>
<div class="notif-panel">
  <div class="notif-panel-header">
    <span><i class="bi bi-bell-fill"></i> Notifications</span>
    <button class="notif-close-btn" (click)="closed.emit()">✕</button>
  </div>
  <div class="notif-list">
    <div *ngIf="notifications.length === 0" class="notif-empty">Aucune notification</div>
    <div *ngFor="let n of notifications" class="notif-item" [class.notif-unread]="!n.vue">
      <div class="notif-dot" *ngIf="!n.vue"></div>
      <div class="notif-body">
        <p class="notif-msg">{{ n.message }}</p>
        <small class="notif-date">{{ n.dateCreation | date:'dd MMM, HH:mm' }}</small>
      </div>
    </div>
  </div>
</div>
