<div class="login-page">
  <div class="login-wrapper">

    <div class="login-card">

      <div class="brand">
        <img src="images/LOGO-STAR-Assurances_page-0001.jpg" alt="STAR Assurances" class="logo">
        <h1>STAR Assurances</h1>
        <p class="subtitle">Plateforme de gestion intelligente</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <span>⚠</span> {{ errorMessage }}
      </div>

      <form>
        <div class="form-group">
          <label for="full_name">Nom Complet</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              id="full_name"
              type="text"
              [(ngModel)]="full_name"
              name="full_name"
              placeholder="Entrez votre nom complet"
              autocomplete="username"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Entrez votre mot de passe"
              autocomplete="current-password"
            >
          </div>
        </div>

        <div class="robot-check">
          <input
            type="checkbox"
            (click)="verifRobot()"
            [checked]="isRobot"
            id="robot"
          >
          <label for="robot">Je ne suis pas un robot</label>
        </div>

        <button type="button" (click)="verifUser()" [disabled]="isLoading" class="btn-login">
          <span *ngIf="!isLoading">Se Connecter</span>
          <span *ngIf="isLoading" class="loading-text">
            <span class="spinner"></span> Connexion en cours...
          </span>
        </button>

        <div class="forgot-password">
          <a routerLink="/forgot-password">Mot de passe oublié ?</a>
        </div>
      </form>
    </div>

    <div class="footer">
      © 2026 STAR Assurances — Tous droits réservés
    </div>
  </div>
</div>
