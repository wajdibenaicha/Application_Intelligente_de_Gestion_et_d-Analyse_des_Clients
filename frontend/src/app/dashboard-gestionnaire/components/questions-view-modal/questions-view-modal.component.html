<div class="modal-overlay" (click)="closed.emit()">
  <div class="modal modal-large" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2><i class="bi bi-eye"></i> {{ questionnaire?.titre }}</h2>
      <button class="btn-close" (click)="closed.emit()">✕</button>
    </div>
    <div style="padding: 0 24px 12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <span class="badge" [ngClass]="getBadgeClass(questionnaire?.statut)">{{ getStatutLabel(questionnaire?.statut) }}</span>
      <span *ngIf="canManageAll" style="color:#666; font-size:13px;">Gestionnaire : {{ questionnaire?.gestionnaire?.fullName || '—' }}</span>
      <span *ngIf="questionnaire?.description" style="color:#666; font-size:13px;">{{ questionnaire?.description }}</span>
    </div>
    <div style="padding: 0 24px 8px; font-weight:700; color:#1a3d2b; font-size:14px;">Questions</div>
    <div style="padding: 0 24px; display:flex; flex-direction:column; gap:8px; max-height:50vh; overflow-y:auto;">
      <div *ngFor="let q of questionnaire?.questions; let i = index" class="selected-chip-block">
        <div class="selected-chip-row">
          <span class="q-num">{{ i + 1 }}</span>
          <span class="q-type-badge">{{ q.type }}</span>
          <span class="q-required-badge" *ngIf="q.required" title="Question obligatoire">*</span>
          <span style="flex:1;">{{ q.titre }}</span>
          <button class="btn-icon btn-delete" *ngIf="questionnaire?.statut === 'BROUILLON'"
            (click)="deleteQuestion.emit({ questionId: q.id, questionnaire: questionnaire })" title="Supprimer">
            <i class="bi bi-trash"></i>
          </button>
        </div>
        <div *ngIf="q.type !== 'text' && q.options && q.options !== ''" class="q-options-chips">
          <span *ngFor="let opt of getOptionsArray(q.options)" class="q-option-chip">{{ opt }}</span>
        </div>
      </div>
      <div *ngIf="!questionnaire?.questions?.length" class="empty-drop">Aucune question</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closed.emit()">Fermer</button>
      <button class="btn-outline" *ngIf="canEdit()" (click)="edit.emit(questionnaire); closed.emit()">
        <i class="bi bi-pencil"></i> Modifier
      </button>
      <button class="btn-save" *ngIf="canRequestPublication()" (click)="requestPublication.emit(questionnaire); closed.emit()">
        <i class="bi bi-send"></i> Envoyer à l'administrateur
      </button>
      <button class="btn-save" *ngIf="canApprove()" (click)="approve.emit(questionnaire.id); closed.emit()">
        <i class="bi bi-check2-circle"></i> Approuver
      </button>
      <button class="btn-danger-sm" *ngIf="canReject()" (click)="reject.emit(questionnaire.id); closed.emit()">
        <i class="bi bi-x-circle"></i> Rejeter
      </button>
    </div>
  </div>
</div>
